<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskalla Nyheter</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0f0f1a;
            --paper: #f5f0e8;
            --blood: #e94560;
            --mold: #7c3aed;
            --ash: #94a3b8;
            --flicker: rgba(233, 69, 96, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background: var(--void);
            color: var(--paper);
            line-height: 1.7;
            max-width: 720px;
            margin: 0 auto;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }
        
        /* SVG Filter Background in Header */
        .header-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 350px;
            z-index: -1;
            opacity: 0.4;
            filter: url(#swirl);
            animation: drift 20s ease-in-out infinite;
        }
        
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-2%, 1%) scale(1.02); }
            50% { transform: translate(1%, -1%) scale(0.98); }
            75% { transform: translate(2%, 2%) scale(1.01); }
        }
        
        /* Noise overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        header {
            text-align: center;
            padding: 4rem 1.5rem 3rem;
            position: relative;
            border-bottom: 1px solid rgba(233, 69, 96, 0.2);
            margin-bottom: 3rem;
        }
        
        /* Glitch effect on title */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }
        
        h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--paper);
            letter-spacing: 0.15em;
            position: relative;
            animation: glitch 4s infinite;
        }
        
        h1::before,
        h1::after {
            content: 'Iskalla Nyheter';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        
        h1::before {
            color: var(--blood);
            animation: glitch-1 3s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        
        h1::after {
            color: var(--mold);
            animation: glitch-2 2s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        
        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-2px, 1px); }
            94% { transform: translate(2px, -1px); }
            96% { transform: translate(-1px, 2px); }
        }
        
        @keyframes glitch-1 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-3px, 0); }
            40% { transform: translate(3px, 0); }
            60% { transform: translate(-1px, 0); }
            80% { transform: translate(1px, 0); }
        }
        
        @keyframes glitch-2 {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(2px, 0); }
            40% { transform: translate(-2px, 0); }
            60% { transform: translate(1px, 0); }
            80% { transform: translate(-1px, 0); }
        }
        
        .tagline {
            color: var(--ash);
            font-size: 0.9rem;
            margin-top: 1rem;
            font-weight: 400;
            opacity: 0.8;
        }
        
        /* Status indicator like old anime sites */
        .status {
            display: inline-block;
            background: var(--blood);
            color: var(--void);
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 700;
            margin-top: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        main {
            padding: 0 1.5rem 4rem;
        }
        
        article {
            margin-bottom: 4rem;
            padding-bottom: 3rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            position: relative;
        }
        
        article::before {
            content: '◆';
            position: absolute;
            left: -1.5rem;
            top: 0.3rem;
            color: var(--blood);
            font-size: 0.6rem;
            opacity: 0.6;
            animation: blink 3s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.2; }
        }
        
        article:last-child {
            border-bottom: none;
        }
        
        .date {
            color: var(--ash);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            font-family: 'Shippori Mincho', serif;
        }
        
        h2 {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.5rem;
            font-weight: 400;
            margin: 0.8rem 0 1rem;
            color: var(--paper);
            line-height: 1.3;
        }
        
        h2 a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px dashed var(--mold);
            transition: all 0.3s;
        }
        
        h2 a:hover {
            color: var(--blood);
            border-bottom-color: var(--blood);
        }
        
        p {
            color: var(--paper);
            opacity: 0.95;
            margin-bottom: 1rem;
        }
        
        .article-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            margin: 1.5rem 0;
            filter: contrast(1.1) saturate(0.8);
            border: 1px solid rgba(233, 69, 96, 0.3);
        }
        
        /* Scanlines on images */
        .img-wrapper {
            position: relative;
            margin: 1.5rem 0;
        }
        
        .img-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
        }
        
        .ordsprak {
            font-family: 'Shippori Mincho', serif;
            font-style: italic;
            color: var(--blood);
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(233, 69, 96, 0.05);
            border-left: 2px solid var(--blood);
            font-size: 0.95rem;
            position: relative;
        }
        
        .ordsprak::before {
            content: '"';
            position: absolute;
            top: -0.5rem;
            left: 0.5rem;
            font-size: 2rem;
            color: var(--mold);
            opacity: 0.3;
        }
        
        footer {
            text-align: center;
            padding: 3rem 1.5rem;
            border-top: 1px solid rgba(124, 58, 237, 0.2);
            color: var(--ash);
            font-size: 0.8rem;
        }
        
        .footer-glitch {
            animation: text-flicker 4s infinite;
        }
        
        @keyframes text-flicker {
            0%, 100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.3; }
            94% { opacity: 1; }
            96% { opacity: 0.5; }
            97% { opacity: 1; }
        }
        
        /* Article page specific */
        .back {
            color: var(--ash);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            margin: 2rem 1.5rem;
            padding: 0.5rem 1rem;
            border: 1px dashed var(--mold);
        }
        
        .back:hover {
            color: var(--blood);
            border-color: var(--blood);
        }
    </style>
</head>
<body>
    <!-- SVG Filters -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="swirl">
                <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="3" result="turbulence">
                    <animate attributeName="baseFrequency" values="0.01;0.015;0.01" dur="20s" repeatCount="indefinite"/>
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="30" xChannelSelector="R" yChannelSelector="G"/>
                <feGaussianBlur stdDeviation="0.5"/>
            </filter>
            <filter id="distort">
                <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="10"/>
            </filter>
        </defs>
    </svg>
    
    <!-- Noise overlay -->
    <div class="noise"></div>
    
    <!-- Animated background -->
    <svg class="header-bg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.3" />
                <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.2" />
                <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0" />
            </linearGradient>
        </defs>
        <rect width="100" height="100" fill="url(#grad1)"/>
        <circle cx="20" cy="30" r="40" fill="#e94560" opacity="0.1">
            <animate attributeName="r" values="40;45;40" dur="8s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.1;0.15;0.1" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="80" cy="60" r="30" fill="#7c3aed" opacity="0.1">
            <animate attributeName="r" values="30;35;30" dur="10s" repeatCount="indefinite"/>
        </circle>
    </svg>
    
    <header>
        <div class="glitch-wrapper">
            <h1>Iskalla Nyheter</h1>
        </div>
        <p class="tagline">Curling & Mörker från Dalarnas Djup</p>
        <span class="status">● ONLINE</span>
    </header>
    
    <main>
        {{INNEHALL}}
    </main>
    
    <footer>
        <p class="footer-glitch">© 2026 — En fånge i en fuktig lada</p>
    </footer>
</body>
</html>
