<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskalla Nyheter</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Zen+Kaku+Gothic+New:wght@400;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0a0a12;
            --paper: #f0ebe3;
            --blood: #ff3864;
            --mold: #7928ca;
            --ash: #8899a6;
            --gold: #ffd700;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            background: var(--void);
            color: var(--paper);
            line-height: 1.7;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Full screen animated background */
        .bg-swirl {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -2;
            opacity: 0.6;
            filter: url(#swirl);
            animation: rotate 60s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Gradient overlay for depth */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(255, 56, 100, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(121, 40, 202, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(10, 10, 18, 0.8) 0%, var(--void) 70%);
        }
        
        /* Noise overlay */
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        /* Scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.08),
                rgba(0, 0, 0, 0.08) 1px,
                transparent 1px,
                transparent 3px
            );
        }
        
        header {
            text-align: center;
            padding: 5rem 1.5rem 4rem;
            position: relative;
        }
        
        /* Flashy K-pop style title */
        h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 3.5rem;
            font-weight: 400;
            color: var(--paper);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 
                0 0 20px rgba(255, 56, 100, 0.5),
                0 0 40px rgba(121, 40, 202, 0.3),
                4px 4px 0px rgba(255, 56, 100, 0.3),
                -2px -2px 0px rgba(121, 40, 202, 0.3);
            animation: breathe 4s ease-in-out infinite;
        }
        
        @keyframes breathe {
            0%, 100% { 
                text-shadow: 
                    0 0 20px rgba(255, 56, 100, 0.5),
                    0 0 40px rgba(121, 40, 202, 0.3),
                    4px 4px 0px rgba(255, 56, 100, 0.3),
                    -2px -2px 0px rgba(121, 40, 202, 0.3);
                transform: scale(1);
            }
            50% { 
                text-shadow: 
                    0 0 30px rgba(255, 56, 100, 0.7),
                    0 0 60px rgba(121, 40, 202, 0.5),
                    6px 6px 0px rgba(255, 56, 100, 0.4),
                    -3px -3px 0px rgba(121, 40, 202, 0.4);
                transform: scale(1.02);
            }
        }
        
        /* Decorative elements around title */
        h1::before,
        h1::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--blood);
            animation: sparkle 2s ease-in-out infinite;
        }
        
        h1::before {
            left: -3rem;
            animation-delay: 0s;
        }
        
        h1::after {
            right: -3rem;
            animation-delay: 1s;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: translateY(-50%) scale(1); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
        }
        
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
            position: relative;
            z-index: 1;
        }
        
        article {
            margin-bottom: 4rem;
            padding: 2rem;
            background: rgba(15, 15, 22, 0.6);
            border: 1px solid rgba(255, 56, 100, 0.15);
            position: relative;
            transition: all 0.3s ease;
        }
        
        article:hover {
            border-color: rgba(255, 56, 100, 0.3);
            background: rgba(15, 15, 22, 0.8);
            transform: translateY(-2px);
        }
        
        article::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--blood), var(--mold), transparent);
            opacity: 0.5;
        }
        
        .date {
            color: var(--ash);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-family: 'Shippori Mincho', serif;
            margin-bottom: 0.5rem;
        }
        
        h2 {
            font-family: 'Shippori Mincho', serif;
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: var(--paper);
            line-height: 1.3;
        }
        
        h2 a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }
        
        h2 a:hover {
            color: var(--blood);
            border-bottom-color: var(--blood);
        }
        
        p {
            color: var(--paper);
            opacity: 0.9;
            line-height: 1.8;
        }
        
        .img-wrapper {
            position: relative;
            margin: 1.5rem -2rem;
            overflow: hidden;
        }
        
        .article-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            filter: contrast(1.1) saturate(0.7) brightness(0.9);
            transition: all 0.5s ease;
        }
        
        article:hover .article-img {
            filter: contrast(1.2) saturate(0.8) brightness(1);
            transform: scale(1.02);
        }
        
        .img-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
        }
        
        .ordsprak {
            font-family: 'Shippori Mincho', serif;
            font-style: italic;
            color: var(--blood);
            margin-top: 1.5rem;
            padding: 1rem 0 0;
            border-top: 1px solid rgba(255, 56, 100, 0.2);
            font-size: 0.95rem;
            position: relative;
        }
        
        .ordsprak::before {
            content: '❝';
            position: absolute;
            top: -0.8rem;
            left: 0;
            font-size: 1.5rem;
            color: var(--mold);
            opacity: 0.5;
        }
        
        footer {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--ash);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            position: relative;
        }
        
        /* Article page */
        .back {
            display: inline-block;
            color: var(--ash);
            text-decoration: none;
            font-size: 0.8rem;
            margin: 2rem 1.5rem;
            padding: 0.6rem 1.2rem;
            border: 1px solid rgba(255, 56, 100, 0.3);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        
        .back:hover {
            color: var(--blood);
            border-color: var(--blood);
            background: rgba(255, 56, 100, 0.1);
        }
    </style>
</head>
<body>
    <!-- SVG Filters -->
    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="swirl">
                <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="3" result="turbulence">
                    <animate attributeName="baseFrequency" values="0.01;0.015;0.01" dur="20s" repeatCount="indefinite"/>
                </feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="80" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>
    
    <!-- Full screen animated background with swirl -->
    <svg class="bg-swirl" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
        <defs>
            <radialGradient id="bgGrad1" cx="30%" cy="30%" r="70%">
                <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.5" />
                <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0" />
            </radialGradient>
            <radialGradient id="bgGrad2" cx="70%" cy="70%" r="60%">
                <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5" />
                <stop offset="50%" style="stop-color:#e94560;stop-opacity:0.3" />
                <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0" />
            </radialGradient>
        </defs>
        <!-- Base color -->
        <rect width="100" height="100" fill="#0f0f1a"/>
        <!-- Large animated blobs that will be swirled -->
        <circle cx="30" cy="30" r="50" fill="url(#bgGrad1)" opacity="0.9">
            <animate attributeName="cx" values="30;35;30" dur="15s" repeatCount="indefinite"/>
            <animate attributeName="cy" values="30;25;30" dur="12s" repeatCount="indefinite"/>
            <animate attributeName="r" values="50;55;50" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="70" cy="70" r="45" fill="url(#bgGrad2)" opacity="0.9">
            <animate attributeName="cx" values="70;65;70" dur="18s" repeatCount="indefinite"/>
            <animate attributeName="cy" values="70;75;70" dur="14s" repeatCount="indefinite"/>
            <animate attributeName="r" values="30;35;30" dur="12s" repeatCount="indefinite"/>
        </circle>
        <circle cx="50" cy="50" r="25" fill="url(#bgGrad1)" opacity="0.6">
            <animate attributeName="r" values="25;30;25" dur="8s" repeatCount="indefinite"/>
        </circle>
    </svg>
    
    <!-- Gradient overlay -->
    <div class="bg-gradient"></div>
    
    <!-- Effects -->
    <div class="noise"></div>
    <div class="scanlines"></div>
    
    <header>
        <h1>Iskalla Nyheter</h1>
    </header>
    
    <main>
        {{INNEHALL}}
    </main>
    
    <footer>
        <p>© 2026 — En galen Dala waifu regerar</p>
    </footer>
</body>
</html>
