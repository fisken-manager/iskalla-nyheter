<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskalla Nyheter</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --tra: #c9b18a;
            --sot: #2a2520;
            --blod: #8b2635;
            --aska: #4a3f35;
            --mork: #1a1714;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--mork);
            color: var(--tra);
            line-height: 1.8;
            max-width: 650px;
            margin: 0 auto;
            padding: 4rem 1.5rem;
        }
        
        header {
            text-align: center;
            padding-bottom: 3rem;
            border-bottom: 1px solid var(--aska);
            margin-bottom: 4rem;
        }
        
        .logo {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.2rem;
            color: var(--blod);
            margin-bottom: 1rem;
            letter-spacing: 0.5em;
        }
        
        .logo-kanji {
            font-size: 3rem;
            display: block;
            color: var(--tra);
            opacity: 0.6;
            margin-bottom: 0.5rem;
        }
        
        h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--tra);
            letter-spacing: 0.2em;
        }
        
        .tagline {
            color: var(--aska);
            font-size: 0.85rem;
            margin-top: 1rem;
            font-weight: 300;
        }
        
        article {
            margin-bottom: 4rem;
            padding-bottom: 4rem;
            border-bottom: 1px solid var(--aska);
        }
        
        article:last-child {
            border-bottom: none;
        }
        
        .date {
            color: var(--aska);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
        }
        
        h2 {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.4rem;
            font-weight: 400;
            margin: 0.8rem 0 1.2rem;
            color: var(--tra);
            line-height: 1.4;
        }
        
        h2 a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }
        
        h2 a:hover {
            border-bottom-color: var(--blod);
        }
        
        p {
            color: var(--tra);
            opacity: 0.9;
            margin-bottom: 1rem;
        }
        
        .article-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            margin: 1.5rem 0;
            filter: sepia(30%) contrast(0.9);
            border: 1px solid var(--aska);
        }
        
        .ordsprak {
            font-family: 'Noto Serif JP', serif;
            font-style: italic;
            color: var(--blod);
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--aska);
            font-size: 0.95rem;
        }
        
        footer {
            text-align: center;
            padding-top: 3rem;
            border-top: 1px solid var(--aska);
            color: var(--aska);
            font-size: 0.8rem;
        }
        
        /* Article page */
        .back {
            color: var(--aska);
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 3rem;
        }
        
        .back:hover {
            color: var(--blod);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="logo-kanji">囚</span>
            ISKALLA NYHETER
        </div>
        <p class="tagline">Curling & Mörker från Dalarnas Djup</p>
    </header>
    
    <main>
        {{INNEHALL}}
    </main>
    
    <footer>
        <p>© 2026 — En fånge i en fuktig lada</p>
    </footer>
</body>
</html>
