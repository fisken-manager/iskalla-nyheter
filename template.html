<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskalla Nyheter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=Inter:wght@300;400&display=swap');
        
        :root {
            --bg: #0d1117;
            --text: #c9d1d9;
            --muted: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            max-width: 700px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        
        header {
            text-align: center;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }
        
        h1 {
            font-family: 'Crimson Text', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #f0f6fc;
            letter-spacing: -0.02em;
        }
        
        .tagline {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }
        
        article {
            margin-bottom: 3rem;
            padding-bottom: 3rem;
            border-bottom: 1px solid var(--border);
        }
        
        article:last-child {
            border-bottom: none;
        }
        
        .date {
            color: var(--muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        h2 {
            font-family: 'Crimson Text', serif;
            font-size: 1.6rem;
            font-weight: 600;
            margin: 0.5rem 0 1rem;
            color: #f0f6fc;
            line-height: 1.3;
        }
        
        h2 a {
            color: inherit;
            text-decoration: none;
        }
        
        h2 a:hover {
            color: var(--accent);
        }
        
        p {
            color: var(--text);
            margin-bottom: 1rem;
        }
        
        .article-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }
        
        .ordsprak {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            color: var(--accent);
            border-left: 2px solid var(--accent);
            padding-left: 1rem;
            margin-top: 1.5rem;
        }
        
        footer {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.85rem;
        }
        
        /* Article page specific */
        .back {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            margin-bottom: 2rem;
        }
        
        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Iskalla Nyheter</h1>
        <p class="tagline">Curling & Mörker från Dalarnas Djup</p>
    </header>
    
    <main>
        {{INNEHALL}}
    </main>
    
    <footer>
        <p>© 2026 — "Isen väntar på ingen människa"</p>
    </footer>
</body>
</html>
